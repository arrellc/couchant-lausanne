<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemin du Couchant, Lausanne</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #FAF6F1;
            color: #2C2C2C;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            text-align: center;
            max-width: 480px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        p {
            font-weight: 300;
            color: #6B6B6B;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        a {
            color: #C67A4B;
            text-decoration: none;
        }
        a:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Chemin du Couchant</h1>
        <p>This apartment is currently let.</p>
        <p>If you would like to be notified when it becomes available again, please get in touch.</p>
        <a href="mailto:info@couchant-lausanne.ch">info@couchant-lausanne.ch</a>
    </div>

</html>
